topic: 2026年9月29日-10月3日东京自由行行程规划（国庆/秋季，羽田进出）

# ============ 行程背景 ============
trip_context:
  dates: 2026-09-29 ~ 2026-10-03   # 6天5晚
  airport_in_out: 羽田机场（HND）进出，但可前往近郊
  base_city: 东京（住宿建议舞滨/浦安一带，迪士尼两天就近）
  season: 秋季初（凉爽，可能有秋雨/台风尾，红叶未到盛期）
  fixed_schedule:
    - date: 2026-09-30
      plan: 东京迪士尼乐园 Disneyland（已定）
    - date: 2026-10-01
      plan: 东京迪士尼海洋 DisneySea（已定）
  days_to_plan:
    - 2026-09-29   # 抵达日（傍晚到，轻量）
    - 2026-10-02   # 整天自由日（强度可高）
    - 2026-10-03   # 离开日（半天，临近羽田）
  preferences: [主题/科技/二次元, 美食与购物, 近郊一日游, 东京经典市区]
  # 重大注意：中秋(9/25-27)+国庆(10/1-7)经"请3休13"打通，行程正处中国出境游绝对高峰，
  # 迪士尼/热门景点/机场/退税柜台异常拥挤，预约与错峰是核心策略。

# ============ 调研对象 ============
items:
  # —— 东京经典市区 ——
  - name: 浅草・上野
    note: 浅草寺/雷门/仲见世，上野公园与博物馆群，经典传统区
  - name: 涩谷・原宿・表参道（含 Shibuya Sky）
    note: 涩谷十字路口、Shibuya Sky 展望台（需指定场次预约）、潮流购物
  - name: 新宿（含都厅夜景・新宿御苑・明治神宫外苑）
    note: 都厅免费夜景、歌舞伎町、御苑赏景、银杏并木、购物
  - name: 银座・筑地・丰洲（含 Ginza Sony Park）
    note: 高端购物、海鲜市场早餐、2025重开的 Ginza Sony Park 新地标
  - name: 秋叶原
    note: 电器/二次元/手办，二次元爱好者必逛
  - name: 东京塔・增上寺・六本木
    note: 夜景、美术馆（森美术馆等）、地标打卡

  # —— 主题/科技/二次元（含2024-2026新景点）——
  - name: 台场 Odaiba + teamLab Planets
    note: 海滨、teamLab Planets（赤脚涉水沉浸，需预约指定场次）、高达、温泉
  - name: 麻布台之丘 Azabudai Hills + teamLab Borderless（2024新）
    note: 日本第一高楼综合体，teamLab Borderless 无界馆常设；与台场Planets是两个不同馆，勿买错票
  - name: 吉卜力美术馆 / 吉卜力公园
    note: 二次元必去，全预约制；美术馆每月10日9:00放下月票，极难抢，需提前规划

  # —— 迪士尼区域就近 / 抵达·离开日低强度 ——
  - name: 舞滨 Ikspiari + 葛西临海公园
    note: 迪士尼度假区内免门票大型购物美食商场+海滨公园，适合抵达日傍晚/离开日就近活动
  - name: 高轮Gateway City / NEWoMan高轮（2025-2026新）
    note: JR高轮Gateway站直结新综合设施，距羽田近，适合抵达/离开日轻量逛街

  # —— 近郊一日游（10/2自由日主力候选）——
  - name: 镰仓・江之岛
    note: 大佛、海岸线、灌篮高手取景地，1日游经典
  - name: 箱根（温泉一日游）
    note: 温泉、芦之湖、海贼船、可远眺富士山
  - name: 横滨
    note: 港未来、中华街、红砖仓库，半日至1日
  - name: 河口湖 / 富士山周边
    note: 富士山打卡；注意10月吉田线等已闭山，只能观景/缆车/游览船，不能登山

  # —— 已定行程深挖 ——
  - name: 东京迪士尼国庆高峰攻略（乐园9/30 + 海洋10/1）
    note: 已定两天，深挖指定日票、DPA/Premier Access、预约通行证、错峰排队策略

# ============ 执行配置 ============
execution:
  batch_size: 1          # 并行agent数量
  items_per_agent: 2     # 每个agent调研项目数
  output_dir: ./tokyo-freetrip-2026/results
