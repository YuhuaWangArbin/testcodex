topic: 越秀区老房子装修 怎么找？考虑什么

description: >-
  调研广州越秀区老房子（老城区砖混/砖木结构、老旧小区、多无电梯、部分涉历史建筑保护）
  装修的「寻找渠道」与「决策考虑维度」。用户重点关注：报价与预算、口碑与质量保障。

items:
  # ---- 装修服务提供方（怎么找） ----
  - id: local_decoration_company
    name: 本地装修公司（区域型/连锁型）
    note: 在越秀区有门店或案例的公司，熟悉老城区老房痛点

  - id: yuexiu_oldhouse_brand
    name: 越秀本地深耕的老房/学区房旧改专项品牌
    note: >-
      强调"越秀本地案例"（如学区房、老楼结构改造）而非泛广州；
      老房局部翻新/旧改专项，本地化经验是关键区分点

  - id: yizhuang_onestop_brand
    name: 整装一站式品牌（材料展厅+闭口合同模式）
    note: >-
      2026广州主流趋势。自有材料展厅杜绝中间加价、闭口报价
      （价格误差≤5%、超出公司承担）、承诺零被动增项+质保；
      直接命中"报价透明+质保"诉求

  - id: construction_team
    name: 施工队/包工头（清包/半包）
    note: 熟人介绍、性价比路线；缺内部监理，隐蔽工程风险需额外把控

  - id: internet_platform
    name: 互联网平台
    note: 土巴兔、齐家网、好好住、大众点评、小红书等接单/比价/找口碑平台

  # ---- 质量保障/合规相关第三方（考虑什么） ----
  - id: third_party_supervision
    name: 第三方装修监理公司（独立验房/监理）
    note: >-
      如装小蜜（覆盖广州、含水电隐蔽工程节点SOP）。
      独立于装修公司，老房隐蔽工程风险高时尤为关键，原框架遗漏

  # ---- 政府/城市更新路径（替代或前置评估） ----
  - id: gov_rebuild_renewal
    name: 政府主导成片连片改造/原拆原建项目
    note: >-
      越秀已有共和东原拆原建（最高7000元/㎡）、人民街微改造等案例；
      危旧房可评估"等政府旧改"是否优于自费装修（涉补贴/改造范围）

  - id: elevator_addition_service
    name: 加装电梯配套服务方（国企统建/成片连片）
    note: >-
      越秀老楼多无电梯，常与装修同期考虑；可提取公积金+财政补助，
      影响搬运隐性成本与施工排期

execution:
  batch_size: 5            # 并行agent数量
  items_per_agent: 2       # 每个agent调研项目数
  output_dir: ./results    # 结果输出目录
